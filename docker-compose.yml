services:

  app:
    build: .
    container_name: task-tracker-app
    ports:
      - "3000:3000"
    depends_on:
      - mysql
      - redis
    env_file:
      - .env
    restart: always

  mysql:
    image: mysql:8.4
    container_name: task-tracker-mysql

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: task_tracker

    ports:
      - "3307:3306"

    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  redis:
    image: redis:7
    container_name: task-tracker-redis
    ports:
      - "6379:6379"

volumes:
  mysql_data: